<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Phoenix-RTOS Pi 4 X11 port — minimal, self-contained fontconfig configuration
  for Window Maker. Staged at /nfstest/etc/fonts/fonts.conf on the NFS export.

  wmaker (via the WINGs toolkit) asks fontconfig for fonts by GENERIC family
  name: "sans serif", "sans serif:bold", and "Sans". With no alias mappings,
  XftFontOpenName() returns NULL and wmaker cannot open its system font (fails
  to start). This file maps those generic names to the one TTF family we stage
  (DejaVu Sans) and points fontconfig at the staged font directory.

  Deliberately NOT staging fontconfig's conf.d/ tree: those are relative
  symlinks into conf.avail/ that would dangle on the NFS export. A hand-written
  config is more deterministic for a single bundled font family.
-->
<fontconfig>

  <!-- Where the staged TTF lives (matches the configure default-fonts dir). -->
  <dir>/nfstest/usr/share/fonts</dir>

  <!-- Writable cache dir (created at stage time). On flaky/RO NFS the cache
       write may fail, but directory scanning still resolves fonts. -->
  <cachedir>/nfstest/var/cache/fontconfig</cachedir>

  <!-- Generic-family aliases -> DejaVu (the family we stage). Cover both the
       lowercase generic forms and the capitalized names wmaker requests. -->
  <alias>
    <family>sans-serif</family>
    <prefer><family>DejaVu Sans</family></prefer>
  </alias>
  <alias>
    <family>sans serif</family>
    <prefer><family>DejaVu Sans</family></prefer>
  </alias>
  <alias>
    <family>Sans</family>
    <prefer><family>DejaVu Sans</family></prefer>
  </alias>
  <alias>
    <family>serif</family>
    <prefer><family>DejaVu Serif</family></prefer>
  </alias>
  <alias>
    <family>Serif</family>
    <prefer><family>DejaVu Serif</family></prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer><family>DejaVu Sans Mono</family></prefer>
  </alias>
  <alias>
    <family>Mono</family>
    <prefer><family>DejaVu Sans Mono</family></prefer>
  </alias>
  <alias>
    <family>lucida</family>
    <prefer><family>DejaVu Sans</family></prefer>
  </alias>

  <!-- Last-resort: any unmatched request falls back to DejaVu Sans so a font
       is always returned (never NULL). -->
  <match target="pattern">
    <test name="family" qual="all" compare="not_eq">
      <string>DejaVu Sans</string>
    </test>
    <edit name="family" mode="append_last" binding="weak">
      <string>DejaVu Sans</string>
    </edit>
  </match>

</fontconfig>
