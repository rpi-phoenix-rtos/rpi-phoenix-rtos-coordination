# lighttpd configuration for the Phoenix-RTOS RPi4 NETWORK STRESS test (task #40).
#
# This is a SEPARATE config from /etc/lighttpd/lighttpd.conf (the HW-validated
# one). It is deliberately minimal and exists so the host-side HTTP load
# generator (tools/stress/net/http-load.py) has a known docroot with both a
# tiny page (latency / requests-per-second) and a 1 MiB file (throughput).
#
# CRITICAL — module set is FIXED at build time:
#   The staged /usr/sbin/lighttpd binary was compiled LIGHTTPD_STATIC with its
#   plugin list generated by grepping `mod_` out of the conf present at build
#   time (see sources/phoenix-rtos-ports/lighttpd/port.def.sh p_prepare). That
#   binary contains EXACTLY: mod_indexfile, mod_dirlisting, mod_staticfile.
#   server.modules here MUST stay a subset of those three, or lighttpd aborts
#   at startup with "Cannot load plugin ... not configured/built in".
#   Do NOT add mod_accesslog / mod_setenv / etc. without rebuilding the port.
#
# Launch on the Pi (psh, from the NFS root):
#   /usr/sbin/lighttpd -D -f /etc/lighttpd-stress.conf
#   (-D = stay in foreground; logs to the file below; Ctrl-C / kill to stop)

server.document-root = "/srv/stress-www"

# Task spec asks for 0.0.0.0:80. Phoenix has no privileged-port restriction so
# 80 binds fine, but the HW-PROVEN lighttpd path used 8080. The host load
# generator takes the port as a CLI arg (--port), so the orchestrator can pick
# either without editing this file. Leaving the default at 80 per the task spec.
server.port = 80

# server.bind unset => lighttpd listens on 0.0.0.0 (all interfaces), which is
# what we want (Pi reachable at 10.42.0.12 on the 10.42.0.0/24 link).

server.modules = (
  "mod_indexfile",
  "mod_dirlisting",
  "mod_staticfile",
)

# Plain-file logs (Phoenix-RTOS has no syslog daemon).
server.errorlog = "/var/log/lighttpd-stress-error.log"
server.pid-file = "/var/run/lighttpd-stress.pid"

# poll() event handler (the only one available on this port); raise the fd /
# connection ceilings well above the load generator's max concurrency (64) so
# a refusal is a real LIMIT, not a config artifact.
server.event-handler   = "poll"
server.max-fds         = 256
server.max-connections = 128

index-file.names = ( "index.html", "index.htm" )
dir-listing.activate = "enable"

mimetype.assign = (
  ".html" => "text/html",
  ".htm"  => "text/html",
  ".txt"  => "text/plain",
  ".bin"  => "application/octet-stream",
  ""      => "application/octet-stream",
)
